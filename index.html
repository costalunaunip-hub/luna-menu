<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7fb0ac">
<title>Luna Bar · Menu · Praia da Vagueira</title>
<style>
:root{
  --sky:#9cc4bf; --sky2:#bcd6ce; --sand:#efe4cf; --sand2:#e4d3b4;
  --sea:#7fb8b4; --ink:#2f3a3a; --muted:#5d6b68; --line:#d8c9ab;
  --card:rgba(255,255,255,.72); --accent:#c56a3a; --accent2:#3f6f6a;
  --shadow:0 6px 20px rgba(47,58,58,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);background:linear-gradient(180deg,#a9cbc6 0%,#c3d9cf 22%,#eadfca 55%,#e9dcc0 100%);
  background-attachment:fixed;line-height:1.45;
}
.hero{
  position:relative;height:220px;background-size:cover;background-position:center 30%;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:14px;box-shadow:inset 0 -70px 60px -20px rgba(233,220,192,.92);
}
.hero h1{
  font-family:Georgia,"Times New Roman",serif;font-weight:700;letter-spacing:.5px;
  font-size:2.6rem;margin:0;color:#2b3636;text-shadow:0 1px 3px rgba(255,255,255,.6);
}
.hero .sub{margin-top:4px;font-size:.78rem;color:#3c4a48;letter-spacing:2px;text-transform:uppercase;opacity:.9;text-shadow:0 1px 2px rgba(255,255,255,.6)}
.wrap{max-width:760px;margin:0 auto;padding:0 14px 60px}

/* language bar */
.langbar{position:sticky;top:0;z-index:30;background:rgba(233,222,198,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:8px 6px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.langbar button{
  border:1px solid var(--line);background:#fff8ec;color:var(--ink);border-radius:20px;
  padding:6px 12px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.langbar button.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.langbar button .flag{font-size:1rem;line-height:1}

/* category chips */
.chips{position:sticky;top:47px;z-index:20;display:flex;gap:7px;overflow-x:auto;padding:9px 4px;
  background:linear-gradient(180deg,rgba(233,222,198,.96),rgba(233,222,198,.75));backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chips a{white-space:nowrap;font-size:.8rem;text-decoration:none;color:var(--accent2);
  border:1px solid var(--accent2);border-radius:16px;padding:5px 11px;background:#fff8ec;transition:.15s}
.chips a:active{background:var(--accent2);color:#fff}

section.cat{margin:26px 0 0}
h2.cat-title{
  font-family:Georgia,serif;font-size:1.5rem;color:var(--accent);margin:0 0 4px;
  border-bottom:2px solid var(--accent);padding-bottom:4px;display:inline-block}
.cat-note{font-size:.78rem;color:var(--muted);margin:2px 0 12px;font-style:italic}

.item{background:var(--card);border:1px solid rgba(216,201,171,.6);border-radius:12px;
  padding:11px 13px;margin:9px 0;box-shadow:var(--shadow);backdrop-filter:blur(2px)}
.item .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.item .name{font-weight:600;font-size:1.02rem;color:var(--ink)}
.item .price{font-weight:700;color:var(--accent2);white-space:nowrap;font-size:1rem}
.item .desc{font-size:.86rem;color:var(--muted);margin-top:3px}
.alg{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.alg span{font-size:.68rem;background:#f2e3c8;color:#7a4a24;border:1px solid #e0c99e;
  border-radius:10px;padding:2px 8px;font-weight:600}
.sub-h{font-weight:700;color:var(--accent2);margin:14px 0 2px;font-size:.95rem}

.legal{margin-top:34px;padding:14px;border-top:1px solid var(--line);font-size:.72rem;color:var(--muted);text-align:center}
.footer-brand{text-align:center;margin-top:18px;font-family:Georgia,serif;color:var(--accent);font-size:1.1rem}
.iva{text-align:center;font-size:.75rem;color:var(--muted);margin-top:20px}
.back-top{position:fixed;right:14px;bottom:16px;z-index:40;background:var(--accent2);color:#fff;
  border:none;border-radius:50%;width:44px;height:44px;font-size:1.1rem;box-shadow:var(--shadow);cursor:pointer;opacity:.9}
@media(max-width:420px){.hero h1{font-size:2.1rem}.hero{height:170px}}
</style>
</head>

/* ---------- RENDER ---------- */
let LANG = (function(){
  const nav=(navigator.language||"pt").slice(0,2).toLowerCase();
  return ["pt","en","fr","de","nl"].includes(nav)?nav:"pt";
})();

function renderLangbar(){
  const b=document.getElementById("langbar");
  b.innerHTML=LANGS.map(l=>`<button data-l="${l.code}" class="${l.code===LANG?'active':''}" onclick="setLang('${l.code}')"><span class="flag">${l.flag}</span>${l.label}</button>`).join("");
}
function renderChips(){
  const c=document.getElementById("chips");
  c.innerHTML=MENU.map(cat=>`<a href="#${cat.id}">${tv(cat.t,LANG)}</a>`).join("");
}
function renderMenu(){
  const m=document.getElementById("menu");
  m.innerHTML=MENU.map(cat=>{
    let html=`<section class="cat" id="${cat.id}"><h2 class="cat-title">${tv(cat.t,LANG)}</h2>`;
    if(cat.note) html+=`<div class="cat-note">${tv(cat.note,LANG)}</div>`;
    cat.items.forEach(it=>{
      if(it.sub){ html+=`<div class="sub-h">${tv(it.sub,LANG)}</div>`; return; }
      const desc=it.d?`<div class="desc">${tv(it.d,LANG)}</div>`:"";
      let alg="";
      if(it.a&&it.a.length){
        alg=`<div class="alg">`+it.a.map(k=>`<span>${tv(ALG[k],LANG)}</span>`).join("")+`</div>`;
      }
      html+=`<div class="item"><div class="row"><div class="name">${tv(it.n,LANG)}</div><div class="price">${it.p}€</div></div>${desc}${alg}</div>`;
    });
    html+=`</section>`;
    return html;
  }).join("");
  document.getElementById("ivaNote").textContent=UI[LANG].iva;
  document.getElementById("legalNote").textContent=UI[LANG].legal;
  document.documentElement.lang=LANG;
}
function setLang(l){ LANG=l; renderLangbar(); renderChips(); renderMenu(); window.scrollTo({top:0,behavior:'smooth'}); }

renderLangbar(); renderChips(); renderMenu();
</script>
